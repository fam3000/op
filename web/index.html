<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#495057">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="web">
  <link rel="icon" type="image/png" sizes="192x192" href="wistron-pcb-icon.png">
  <link rel="apple-touch-icon" href="wistron-pcb-icon.png">
  <title>web</title>
  <style>
    :root {
      --color-main: #495057;
      --color-gray: #adb5bd;
      --color-light: #e9ecef;
      --color-bg: #f5f5f5;
      --color-white: #ffffff;
      --color-border: #d9dee3;
      --color-shadow: rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --gap: 8px;
      --btn-h: 36px;
      --header-h: 52px;
      --trans: 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--color-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--color-main);
      font-size: 14px;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: var(--gap);
      padding: 0 var(--gap);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-light);
      flex-shrink: 0;
      box-shadow: 0 1px 4px var(--color-shadow);
      z-index: 10;
      position: relative;
    }

    /* 左側下拉容器 */
    .logo-dropdown-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .app-logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--color-main);
      flex-shrink: 0;
      animation: bounce 1s infinite alternate;
      user-select: none;
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color var(--trans);
    }
    .app-logo:active {
      transform: scale(0.98);
      background-color: var(--color-light);
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }

    /* 下拉選單樣式統一UI */
    .logo-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 140px;
      background: var(--color-white);
      border-radius: var(--radius);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 99;
      border: 1px solid var(--color-light);
    }
    .logo-dropdown-wrap.show .logo-dropdown-menu {
      display: block;
    }
    .logo-dropdown-item {
      width: 100%;
      padding: 11px 14px;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      color: var(--color-main);
      cursor: pointer;
      transition: background-color var(--trans);
    }
    .logo-dropdown-item + .logo-dropdown-item {
      border-top: 1px solid #f1f3f5;
    }
    .logo-dropdown-item:active {
      background: var(--color-light);
    }

    .tab-scroll-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .tab-scroll-wrap::-webkit-scrollbar {
      display: none;
    }

    .tab-bar {
      min-width: max-content;
      display: flex;
      align-items: center;
      gap: var(--gap);
      height: 100%;
      padding: 0 4px;
    }

    .tab-btn {
      height: var(--btn-h);
      min-width: 88px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }

    .tab-btn:active {
      transform: scale(0.98);
    }

    .tab-btn.active {
      background: var(--color-gray);
      color: var(--color-white);
    }

    /* 右側按鈕 */
    .header-actions {
      display: flex;
      gap: var(--gap);
      flex-shrink: 0;
    }
    .setting-btn, .copy-btn {
      height: var(--btn-h);
      min-width: 54px;
      padding: 0 10px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .setting-btn:active, .copy-btn:active {
      transform: scale(0.98);
    }

    .main-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }

    .iframe-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-white);
    }

    .tool-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--color-white);
      display: block;
    }

    .loading-tip {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      background: rgba(73, 80, 87, 0.88);
      color: #fff;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.22s ease;
    }

    .loading-tip.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 設定彈窗結構：標題+底部固定，中間滾動 */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99;
      padding: 16px;
    }
    .modal-mask.show {
      display: flex;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 85vh;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--color-light);
      font-weight: 700;
      color: var(--color-main);
      flex-shrink: 0;
    }
    .modal-body {
      padding: 16px;
      display: grid;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .field-label {
      font-size: 13px;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .modal-body input,
    .modal-body textarea {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-main);
      outline: none;
      background: #fff;
    }
    .modal-body input:focus,
    .modal-body textarea:focus {
      border-color: var(--color-gray);
    }
    .modal-body textarea {
      min-height: 140px;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #6c757d;
      line-height: 1.5;
    }
    .modal-foot {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px 16px;
      border-top: 1px solid var(--color-light);
      flex-shrink: 0;
    }
    .modal-foot button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary {
      background: var(--color-main);
      color: #fff;
    }
    .btn-ghost {
      background: var(--color-light);
      color: var(--color-main);
    }

    @media (max-width: 640px) {
      .app-logo {
        font-size: 1.35rem;
      }

      .tab-btn {
        min-width: 82px;
        padding: 0 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <!-- 左側下拉標題 -->
      <div class="app-logo" id="appLogo">web</div>

      <div class="tab-scroll-wrap">
        <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" type="button" data-src="https://tlk.io/pcb" data-name="TLK">TLK</button>
      
        <button class="tab-btn " type="button" data-src="https://tcn7suhgzdxm.feishu.cn/drive/home/" data-name="飛書">飛書</button>
      
        <button class="tab-btn " type="button" data-src="https://fam3000.github.io/op/good/%E7%B6%B2%E5%9F%9F.html" data-name="網域">網域</button>
      
        <button class="tab-btn " type="button" data-src="https://sdocapp.com/recent" data-name="文檔">文檔</button>
      </div>
      </div>

      <!-- 右側按鈕群 -->
      <div class="header-actions">
        
        
      </div>
    </header>

    <main class="main-area">
      <div class="iframe-wrap">
        <div class="loading-tip" id="loadingTip">載入中...</div>

        <iframe id="toolFrame" class="tool-frame" title="工具內容" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" src="template1.html"></iframe>
      </div>
    </main>
  </div>

  <!-- 設定彈窗 -->
  

  <script>
    const APP_CONFIG = {
      logoText: '模板',
      appTitle: '模板',
      homeTitle: '模板',
      iconFile: 'wistron-pcb-icon.png',
      gapValue: 8,
      : [
        { name: '模板1', src: 'template1.html' },
        { name: '模板2', src: 'template2.html' },
        { name: '模板3', src: 'template3.html' }
      ],
      tools: [
        { name: '模板1', src: 'template1.html' },
        { name: '模板2', src: 'template2.html' },
        { name: '模板3', src: 'template3.html' },
        { name: '模板4', src: 'template4.html' },
        { name: '模板5', src: 'template5.html' }
      ]
    };

    const tabBar = document.getElementById('tabBar');
    const toolFrame = document.getElementById('toolFrame');
    const loadingTip = document.getElementById('loadingTip');
    const appLogo = document.getElementById('appLogo');
    const logoDropdownWrap = document.getElementById('logoDropdownWrap');
    const logoMenu = document.getElementById('logoMenu');
    const modalMask = document.getElementById('modalMask');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const copyHtmlBtn = document.getElementById('copyHtmlBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const applyBtn = document.getElementById('applyBtn');
    const  = document.getElementById('');
    const  = document.getElementById('');
    const  = document.getElementById('');
    const  = document.getElementById('');
    const  = document.getElementById('');
    const  = document.getElementById('');

    let tools = [...APP_CONFIG.tools];
    let logoMenuData = [...APP_CONFIG.];
    let currentSrc = '';
    let longPressTimer = null;
    let isLongPressed = false;

    // 名稱轉安全檔名
    function slugify(name) {
      return name.trim().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\u4e00-\u9fff-]/g, '');
    }

    // 空格分隔解析器
    function parseListText(text) {
      const lines = text.split('\n').map(item => item.trim()).filter(Boolean);
      const res = [];
      lines.forEach(line => {
        const parts = line.split(/\s+/);
        if (parts.length === 1) {
          const name = parts[0].trim();
          if (!name) return;
          const fileName = slugify(name) + '.html';
          res.push({ name, src: fileName });
        } else {
          const name = parts[0].trim();
          const src = parts.slice(1).join(' ').trim();
          if (name && src) res.push({ name, src });
        }
      });
      return res;
    }

    // 渲染左側下拉選單
    function () {
      logoMenu.innerHTML = logoMenuData.map(item => `
        <button class="logo-dropdown-item" data-src="${item.src}">${item.name}</button>
      `).join('');
      logoMenu.querySelectorAll('.logo-dropdown-item').forEach(btn => {
        btn.onclick = () => {
          const src = btn.dataset.src;
          loadTool(src);
          logoDropdownWrap.classList.remove('show');
        }
      })
    }

    // 複製成品HTML
    function copyText(text) {
      return new Promise((resolve) => {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => {
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.position = 'fixed';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              const ok = document.execCommand('copy');
              document.body.removeChild(ta);
              resolve(ok);
            });
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            resolve(ok);
          }
        } catch (err) {
          resolve(false);
        }
      });
    }

    // 匯出乾淨成品（移除設定與下拉相關程式）
    function getCleanHtml() {
      const clone = document.documentElement.cloneNode(true);
      clone.querySelector('.setting-btn')?.remove();
      clone.querySelector('.copy-btn')?.remove();
      clone.querySelector('#openSettingsBtn')?.remove();
      clone.querySelector('#copyHtmlBtn')?.remove();
      clone.querySelector('.modal-mask')?.remove();
      clone.querySelector('.logo-dropdown-wrap')?.replaceWith(clone.querySelector('.app-logo'));

      let scriptDom = clone.querySelector('script');
      if (scriptDom) {
        let scriptTxt = scriptDom.textContent;
        scriptTxt = scriptTxt
          .replace(/logoDropdownWrap[\s\S]*?logoMenu\.classList/g, '')
          .replace(/||/g, '')
          .replace(/openSettingsBtn[\s\S]*?modalMask\.classList\.remove\("show"\);/g, '')
          .replace(/copyHtmlBtn[\s\S]*?setTimeout\(\(\)=> copyHtmlBtn\.textContent = '複製', 1200\);/g, '')
          .replace(/cancelBtn\.addEventListener[\s\S]*?modalMask\.classList\.remove\("show"\);/g, '')
          .replace(/modalMask\.addEventListener[\s\S]*?modalMask\.classList\.remove\("show"\);/g, '')
          .replace(/applyBtn\.addEventListener[\s\S]*?modalMask\.classList\.remove\("show"\);/g, '')
          .replace(/||||/g, '');
        scriptDom.textContent = scriptTxt;
      }
      return clone.innerHTML;
    }

    function updateMetaAndTitle() {
      const pageTitle = .value.trim() || APP_CONFIG.appTitle;
      const iconFile = .value.trim() || APP_CONFIG.iconFile;
      document.title = pageTitle;
      document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', pageTitle);
      let favicon = document.querySelector('link[rel="icon"]');
      if (favicon) favicon.setAttribute('href', iconFile);
      let appleTouch = document.querySelector('link[rel="apple-touch-icon"]');
      if (appleTouch) appleTouch.setAttribute('href', iconFile);
    }

    function updateGapValue(value) {
      const gapNum = parseInt(value, 10) || 8;
      document.documentElement.style.setProperty('--gap', gapNum + 'px');
    }

    // 渲染頂部分頁按鈕
    function renderTabs() {
      tabBar.innerHTML = tools.map((tool, index) => `
        <button
          class="tab-btn ${index === 0 ? 'active' : ''}"
          type="button"
          data-src="${tool.src}"
          data-name="${tool.name}"
        >${tool.name}</button>
      `).join('');
      if (tools.length > 0) loadTool(tools[0].src);
    }

    function setActiveButton(src) {
      tabBar.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.src === src);
      });
    }

    function showLoading(show = true) {
      loadingTip.classList.toggle('show', show);
    }

    function loadTool(src) {
      if (!src || src === currentSrc) return;
      if (/^https?:\/\//.test(src)) {
        window.open(src, '_blank');
        return;
      }
      currentSrc = src;
      showLoading(true);
      toolFrame.src = src;
      setActiveButton(src);
    }

    // 關閉所有下拉
    function closeAllDropdowns() {
      logoDropdownWrap.classList.remove('show');
      isLongPressed = false;
    }

    // 左側標題點擊下拉
    appLogo.addEventListener('click', (e) => {
      e.stopPropagation();
      logoDropdownWrap.classList.toggle('show');
    })

    // 點擊空白關閉下拉
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.logo-dropdown-wrap')) {
        logoDropdownWrap.classList.remove('show');
      }
    })

    // 分頁點擊切換
    tabBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      loadTool(btn.dataset.src);
    });

    // iframe載入完成關閉loading
    toolFrame.addEventListener('load', () => {
      showLoading(false);
    });

    // 打開設定面板回填資料
    openSettingsBtn.addEventListener('click', () => {
      .value = appLogo.textContent.trim() || APP_CONFIG.logoText;
      .value = document.title || APP_CONFIG.appTitle;
      .value = document.querySelector('link[rel="icon"]')?.getAttribute('href') || APP_CONFIG.iconFile;
      .value = document.documentElement.style.getPropertyValue('--gap') || APP_CONFIG.gapValue;

      const logoSaveText = logoMenuData.map(t => {
        if (t.src === slugify(t.name) + '.html') return t.name;
        else return `${t.name} ${t.src}`;
      }).join('\n');
      .value = logoSaveText;

      const saveList = tools.map(t => {
        if (t.src === slugify(t.name) + '.html') return t.name;
        else return `${t.name} ${t.src}`;
      }).join('\n');
      .value = saveList;
      modalMask.classList.add('show');
    });

    // 複製成品按鈕
    copyHtmlBtn.addEventListener('click', async () => {
      updateMetaAndTitle();
      closeAllDropdowns();
      const cleanHtml = getCleanHtml();
      const ok = await copyText(cleanHtml);
      copyHtmlBtn.textContent = ok ? '已複製' : '失敗';
      setTimeout(() => copyHtmlBtn.textContent = '複製', 1200);
    });

    // 取消設定
    cancelBtn.addEventListener('click', () => {
      modalMask.classList.remove('show');
    });

    // 點遮罩外層關閉
    modalMask.addEventListener('click', (e) => {
      if (e.target === modalMask) modalMask.classList.remove('show');
    });

    // 套用設定
    applyBtn.addEventListener('click', () => {
      const logoText = .value.trim();
      const pageTitle = .value.trim();
      const iconFile = .value.trim();
      const gapVal = .value.trim();
      const logoMenuText = .value;
      const toolText = .value;

      if (logoText) appLogo.textContent = logoText;
      if (pageTitle) document.title = pageTitle;
      if (iconFile) {
        document.querySelector('link[rel="icon"]').setAttribute('href', iconFile);
        document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', iconFile);
      }
      if (gapVal) updateGapValue(gapVal);

      logoMenuData = parseListText(logoMenuText);
      ();

      const newTools = parseListText(toolText);
      if (newTools.length) {
        tools = newTools;
        renderTabs();
      }
      updateMetaAndTitle();
      modalMask.classList.remove('show');
    });

    // 初始化執行
    appLogo.textContent = APP_CONFIG.logoText;
    document.title = APP_CONFIG.appTitle;
    document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', APP_CONFIG.homeTitle);
    document.querySelector('link[rel="icon"]').setAttribute('href', APP_CONFIG.iconFile);
    document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', APP_CONFIG.iconFile);
    updateGapValue(APP_CONFIG.gapValue);
    ();
    renderTabs();
  </script>

</body>
