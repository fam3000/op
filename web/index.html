<html lang="zh-TW" style="--gap: 8px;"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#495057">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="web">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="web.icon.png">
<link rel="apple-touch-icon" href="web.icon.png">
<title>web</title>
  <style>
    :root {
      --color-main: #495057;
      --color-gray: #adb5bd;
      --color-light: #e9ecef;
      --color-bg: #f5f5f5;
      --color-white: #ffffff;
      --color-border: #d9dee3;
      --color-shadow: rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --gap: 8px;
      --btn-h: 36px;
      --header-h: 52px;
      --trans: 0.2s ease;
    }
    html, body {
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      background: var(--color-bg);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .full-screen {
      position: fixed;
      inset: 0;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      bottom: env(safe-area-inset-bottom);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--color-main);
      font-size: 14px;
    }
    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .app-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: var(--gap);
      padding: 0 var(--gap);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-light);
      flex-shrink: 0;
      box-shadow: 0 1px 4px var(--color-shadow);
      z-index: 10;
      position: relative;
    }
    .logo-dropdown-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .app-logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--color-main);
      flex-shrink: 0;
      animation: bounce 1s infinite alternate;
      user-select: none;
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color var(--trans);
    }
    .app-logo:active {
      transform: scale(0.98);
      background-color: var(--color-light);
    }
    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }
    .logo-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 140px;
      background: var(--color-white);
      border-radius: var(--radius);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 99;
      border: 1px solid var(--color-light);
    }
    .logo-dropdown-wrap.show .logo-dropdown-menu {
      display: block;
    }
    .logo-dropdown-item {
      width: 100%;
      padding: 11px 14px;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      color: var(--color-main);
      cursor: pointer;
      transition: background-color var(--trans);
    }
    .logo-dropdown-item + .logo-dropdown-item {
      border-top: 1px solid #f1f3f5;
    }
    .logo-dropdown-item:active {
      background: var(--color-light);
    }
    .tab-scroll-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tab-scroll-wrap::-webkit-scrollbar {
      display: none;
    }
    .tab-bar {
      min-width: max-content;
      display: flex;
      align-items: center;
      gap: var(--gap);
      height: 100%;
      padding: 0 4px;
    }
    .tab-btn {
      height: var(--btn-h);
      min-width: 88px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .tab-btn:active {
      transform: scale(0.98);
    }
    .tab-btn.active {
      background: var(--color-gray);
      color: var(--color-white);
    }
    .header-actions {
      display: flex;
      gap: var(--gap);
      flex-shrink: 0;
    }
    .setting-btn, .copy-btn {
      height: var(--btn-h);
      min-width: 54px;
      padding: 0 10px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .setting-btn:active, .copy-btn:active {
      transform: scale(0.98);
    }
    .main-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }
    .iframe-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-white);
    }
    .tool-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--color-white);
      display: block;
    }
    .loading-tip {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      background: rgba(73, 80, 87, 0.88);
      color: #fff;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.22s ease;
    }
    .loading-tip.show {
      opacity: 1;
      transform: translateY(0);
    }
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }
    .modal-mask.show {
      display: flex;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 85vh;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--color-light);
      font-weight: 700;
      color: var(--color-main);
      flex-shrink: 0;
    }
    .modal-body {
      padding: 16px;
      display: grid;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .field-label {
      font-size: 13px;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .modal-body input,
    .modal-body textarea {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-main);
      outline: none;
      background: #fff;
    }
    .modal-body input:focus,
    .modal-body textarea:focus {
      border-color: var(--color-gray);
    }
    .modal-body textarea {
      min-height: 140px;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #6c757d;
      line-height: 1.5;
    }
    .modal-foot {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px 16px;
      border-top: 1px solid var(--color-light);
      flex-shrink: 0;
    }
    .modal-foot button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary {
      background: var(--color-main);
      color: #fff;
    }
    .btn-ghost {
      background: var(--color-light);
      color: var(--color-main);
    }
    @media (max-width: 640px) {
      .app-logo {
        font-size: 1.35rem;
      }
      .tab-btn {
        min-width: 82px;
        padding: 0 12px;
        font-size: 12px;
      }
      .setting-btn, .copy-btn {
        min-width: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="logo-dropdown-wrap" id="logoDropdownWrap">
        <div class="app-logo" id="appLogo">web</div>
        <div class="logo-dropdown-menu" id="logoMenu">
        <button class="logo-dropdown-item" data-src="https://fam3000.github.io/op/right/index.html">TIME</button>
      
        <button class="logo-dropdown-item" data-src="https://fam3000.github.io/op/good/index">Good</button>
      
        <button class="logo-dropdown-item" data-src="https://fam3000.github.io/mb/index">模板</button>
      
        <button class="logo-dropdown-item" data-src="https://fam3000.github.io/op/ta2/index">ta2</button>
      </div>
      </div>
      <div class="tab-scroll-wrap">
        <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" type="button" data-src="https://tlk.io/pcb" data-name="TLK">TLK</button>
      
        <button class="tab-btn " type="button" data-src="https://tcn7suhgzdxm.feishu.cn/drive/home/" data-name="飛書">飛書</button>
      
        <button class="tab-btn " type="button" data-src="https://fam3000.github.io/op/good/網域.html" data-name="網域">網域</button>
      
        <button class="tab-btn " type="button" data-src="https://sdocapp.com/recent" data-name="文檔">文檔</button>
      </div>
      </div>
      
    </header>
    <main class="main-area">
      <div class="iframe-wrap">
        <div class="loading-tip" id="loadingTip">載入中...</div>
        <iframe id="toolFrame" class="tool-frame" title="工具內容" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" src=""></iframe>
      </div>
    </main>
  </div>
  

<script>
const APP_CONFIG = {
  logoText: "web",
  appTitle: "web",
  homeTitle: "web",
  iconFile: "web.icon.png",
  gap: 8,
  logoMenuList: [{"name":"TIME","src":"https://fam3000.github.io/op/right/index.html"},{"name":"Good","src":"https://fam3000.github.io/op/good/index"},{"name":"模板","src":"https://fam3000.github.io/mb/index"},{"name":"ta2","src":"https://fam3000.github.io/op/ta2/index"}],
  tools: [{"name":"TLK","src":"https://tlk.io/pcb"},{"name":"飛書","src":"https://tcn7suhgzdxm.feishu.cn/drive/home/"},{"name":"網域","src":"https://fam3000.github.io/op/good/網域.html"},{"name":"文檔","src":"https://sdocapp.com/recent"}]
};
const tabBar = document.getElementById('tabBar');
const toolFrame = document.getElementById('toolFrame');
const loadingTip = document.getElementById('loadingTip');
const appLogo = document.getElementById('appLogo');
const logoDropdownWrap = document.getElementById('logoDropdownWrap');
const logoMenu = document.getElementById('logoMenu');
let tools = [...APP_CONFIG.tools];
let logoMenuData = [...APP_CONFIG.logoMenuList];
let currentSrc = '';
function slugify(name) {
  return name.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fff-]/g, '');
}
function renderLogoMenu() {
  logoMenu.innerHTML = logoMenuData.map(item => `
    <button class="logo-dropdown-item" data-src="${item.src}">${item.name}</button>
  `).join('');
}
function renderTabs() {
  tabBar.innerHTML = tools.map((tool, index) => `
    <button
      class="tab-btn ${index === 0 ? 'active' : ''}"
      type="button"
      data-src="${tool.src}"
      data-name="${tool.name}"
    >${tool.name}</button>
  `).join('');
  currentSrc = '';
  toolFrame.src = '';
}
function setActiveButton(src) {
  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.src === src);
  });
}
function showLoading(show = true) {
  loadingTip.classList.toggle('show', show);
}
// 頂部標籤：https 新分頁
function loadToolTab(src) {
  if (!src || src === currentSrc) return;
  if (/^https?:\/\//.test(src)) {
    window.open(src, '_blank');
    return;
  }
  currentSrc = src;
  showLoading(true);
  toolFrame.src = src;
  setActiveButton(src);
}
// 下拉選單：所有連結一律嵌入 iframe（包含 GitHub Pages https）
function loadToolDropdown(src) {
  if (!src || src === currentSrc) return;
  currentSrc = src;
  showLoading(true);
  toolFrame.src = src;
  setActiveButton(src);
}
// Logo下拉交互
appLogo.addEventListener('click', (e) => {
  e.stopPropagation();
  logoDropdownWrap.classList.toggle('show');
});
logoMenu.addEventListener('click', (e) => {
  const item = e.target.closest('.logo-dropdown-item');
  if (!item) return;
  const src = item.dataset.src;
  loadToolDropdown(src);
  logoDropdownWrap.classList.remove('show');
});
document.addEventListener('click', (e) => {
  if (!logoDropdownWrap.contains(e.target)) {
    logoDropdownWrap.classList.remove('show');
  }
});
// 頂部標籤點擊
tabBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  loadToolTab(btn.dataset.src);
});
toolFrame.addEventListener('load', () => {
  showLoading(false);
});
appLogo.textContent = APP_CONFIG.logoText;
document.title = APP_CONFIG.appTitle;
document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', APP_CONFIG.appTitle);
document.querySelector('link[rel="icon"]').setAttribute('href', APP_CONFIG.iconFile);
document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', APP_CONFIG.iconFile);
document.documentElement.style.setProperty('--gap', APP_CONFIG.gap + 'px');
renderLogoMenu();
renderTabs();
</script>


</body></html>
