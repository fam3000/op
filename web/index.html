<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<!-- 行動裝置滿版渲染、禁止雙擊縮放、適配螢幕圓角安全區 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- 瀏覽器頂部主題色（加入桌面捷徑必備），依照頁面背景色替換色值 -->
<meta name="theme-color" content="#495057">

<!-- iOS 加入主畫面捷徑專用配置 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- 桌面捷徑自訂顯示名稱 -->
<meta name="apple-mobile-web-app-title" content="web">

<!-- Android 桌面捷徑開啟全螢幕模式 -->
<meta name="mobile-web-app-capable" content="yes">

<!-- Android 桌面捷徑圖標 -->
<link rel="icon" type="image/png" sizes="192x192" href="web.icon.png">
<!-- iOS 加入主畫面專用圖標 -->
<link rel="apple-touch-icon" href="web.icon.png">

<title>web</title>

  <style>
    :root {
      --color-main: #495057;
      --color-gray: #adb5bd;
      --color-light: #e9ecef;
      --color-bg: #f5f5f5;
      --color-white: #ffffff;
      --color-border: #d9dee3;
      --color-shadow: rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --gap: 8px;
      --btn-h: 36px;
      --header-h: 52px;
      --trans: 0.2s ease;
    }

    /* 新增全域安全區規則 */
    html, body {
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      background: var(--color-bg);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* 滿版容器專用樣式 */
    .full-screen {
      position: fixed;
      inset: 0;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      bottom: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--color-main);
      font-size: 14px;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: var(--gap);
      padding: 0 var(--gap);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-light);
      flex-shrink: 0;
      box-shadow: 0 1px 4px var(--color-shadow);
      z-index: 10;
    }

    .app-logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--color-main);
      flex-shrink: 0;
      animation: bounce 1s infinite alternate;
      user-select: none;
      padding: 2px 4px;
      border-radius: 6px;
      cursor: default;
    }

    .app-logo:active {
      transform: scale(0.98);
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }

    .tab-scroll-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .tab-scroll-wrap::-webkit-scrollbar {
      display: none;
    }

    .tab-bar {
      min-width: max-content;
      display: flex;
      align-items: center;
      gap: var(--gap);
      height: 100%;
      padding: 0 4px;
    }

    .tab-btn {
      height: var(--btn-h);
      min-width: 88px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }

    .tab-btn:active {
      transform: scale(0.98);
    }

    .tab-btn.active {
      background: var(--color-gray);
      color: var(--color-white);
    }

    .setting-btn, .copy-btn {
      height: var(--btn-h);
      min-width: 54px;
      padding: 0 10px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }

    .setting-btn:active, .copy-btn:active {
      transform: scale(0.98);
    }

    .main-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }

    .iframe-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-white);
    }

    .tool-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--color-white);
      display: block;
    }

    .loading-tip {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      background: rgba(73, 80, 87, 0.88);
      color: #fff;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.22s ease;
    }

    .loading-tip.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .app-logo {
        font-size: 1.35rem;
      }

      .tab-btn {
        min-width: 82px;
        padding: 0 12px;
        font-size: 12px;
      }

      .setting-btn, .copy-btn {
        min-width: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div id="appLogo" class="app-logo">web</div>

      <div class="tab-scroll-wrap">
        <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" type="button" data-src="https://tlk.io/pcb" data-name="TLK">TLK</button>
        <button class="tab-btn " type="button" data-src="https://tcn7suhgzdxm.feishu.cn/drive/home/" data-name="飛書">飛書</button>
        <button class="tab-btn " type="button" data-src="https://fam3000.github.io/op/good/網域.html" data-name="網域">網域</button>
        <button class="tab-btn " type="button" data-src="https://sdocapp.com/recent" data-name="文檔">網域</button>
      </div>
      </div>
    </header>

    <main class="main-area">
      <div class="iframe-wrap">
        <div class="loading-tip" id="loadingTip">載入中...</div>
        <iframe id="toolFrame" class="tool-frame" title="工具內容" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" src=""></iframe>
      </div>
    </main>
  </div>

<script>
    const APP_CONFIG = {
      logoText: 'web',
      appTitle: 'web',
      homeTitle: 'web',
      iconFile: 'web.icon.png',
      tools: [
        { name: 'TLK', src: 'https://tlk.io/pcb' },
        { name: '飛書', src: 'https://tcn7suhgzdxm.feishu.cn/drive/home/' },
        { name: '網域', src: 'https://fam3000.github.io/op/good/網域.html' }
        { name: '文檔', src: 'https://sdocapp.com/recent' }
      ]
    };

    const tabBar = document.getElementById('tabBar');
    const toolFrame = document.getElementById('toolFrame');
    const loadingTip = document.getElementById('loadingTip');
    const appLogo = document.getElementById('appLogo');

    let tools = [...APP_CONFIG.tools];
    let currentSrc = '';

    function slugify(name) {
      return name.trim().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\u4e00-\u9fff-]/g, '');
    }

    function parseNames(text) {
      return text
        .split(/[\n,，]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function buildToolsFromNames(names) {
      const seen = new Map();
      return names.map((name, index) => {
        const base = slugify(name) || `tool-${index + 1}`;
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        const safe = count === 0 ? base : `${base}-${count + 1}`;
        return { name, src: `${safe}.html` };
      });
    }

    function copyText(text) {
      return new Promise((resolve) => {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => {
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.position = 'fixed';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              const ok = document.execCommand('copy');
              document.body.removeChild(ta);
              resolve(ok);
            });
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            resolve(ok);
          }
        } catch (err) {
          resolve(false);
        }
      });
    }

    function getCleanHtml() {
      const clone = document.documentElement.cloneNode(true);
      return clone.innerHTML;
    }

    function updateMetaAndTitle() {
      const pageTitle = APP_CONFIG.appTitle;
      const iconFile = APP_CONFIG.iconFile;

      document.title = pageTitle;
      document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', pageTitle);

      let favicon = document.querySelector('link[rel="icon"]');
      if (favicon) favicon.setAttribute('href', iconFile);

      let appleTouch = document.querySelector('link[rel="apple-touch-icon"]');
      if (appleTouch) appleTouch.setAttribute('href', iconFile);
    }

    function renderTabs() {
      tabBar.innerHTML = tools.map((tool, index) => `
        <button
          class="tab-btn ${index === 0 ? 'active' : ''}"
          type="button"
          data-src="${tool.src}"
          data-name="${tool.name}"
        >${tool.name}</button>
      `).join('');

      currentSrc = '';
      toolFrame.src = '';
    }

    function setActiveButton(src) {
      tabBar.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.src === src);
      });
    }

    function showLoading(show = true) {
      loadingTip.classList.toggle('show', show);
    }

    function loadTool(src) {
      if (!src || src === currentSrc) return;

      if (/^https?:\/\//.test(src)) {
        window.open(src, '_blank');
        return;
      }

      currentSrc = src;
      showLoading(true);
      toolFrame.src = src;
      setActiveButton(src);
    }

    tabBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      loadTool(btn.dataset.src);
    });

    toolFrame.addEventListener('load', () => {
      showLoading(false);
    });

    appLogo.textContent = APP_CONFIG.logoText;
    document.title = APP_CONFIG.appTitle;
    document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', APP_CONFIG.homeTitle);
    document.querySelector('link[rel="icon"]').setAttribute('href', APP_CONFIG.iconFile);
    document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', APP_CONFIG.iconFile);

    renderTabs();
</script>

</body>
</html>
