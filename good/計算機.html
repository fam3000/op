<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>計算機</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent;}
:root{
    --bg-main:#232323;
    --bg-panel:#202020;
    --text-main:#ffffff;
    --text-sub:#7B8C9E;
    --key-num-bg:#D5D5D5;
    --key-num-text:#000000;
    --key-op-bg:#708090;
    --key-op-text:#000000;
    --grid-line:#383838;
    --active-row:#383838;
    --setting-icon-color:#ffffff;
}
html,body{height:100%;background:var(--bg-main);color:var(--text-main);overflow:hidden;}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;}

.setting-icon{
    position:absolute;
    top:calc(env(safe-area-inset-top, 0px) + 10px);
    left:calc(env(safe-area-inset-left, 0px) + 10px);
    width:28px;
    height:28px;
    opacity:0.9;
    z-index:20;
    cursor:pointer;
    fill:none;
    stroke:var(--setting-icon-color);
    stroke-width:1.8;
    transition:stroke 0.2s, opacity 0.2s;
}

/* 歷史區左右padding改0，撐滿畫面 */
.history-wrap{
    flex:1;
    padding:calc(env(safe-area-inset-top, 20px) + 16px) 0 4px;
    overflow-y:auto;
    text-align:right;
    background:var(--bg-panel);
}
.history-date{
    color:var(--text-sub);
    font-size:20px;
    margin:6px 0 2px;
    padding:0 16px;
}
.history-item{
    font-size:20px;
    margin:2px 0;
    color:var(--text-main);
    padding:2px 16px;
    border-radius:6px;
    cursor:pointer;
    transition:background 0.2s;
    word-break:break-all;
}
.history-item:active{background:#303030;}
.history-item.active{background:var(--active-row);}
.note-item-left{
    font-size:20px;
    color:var(--text-sub);
    padding:2px 16px;
    text-align:left;
    margin:2px 0 6px 0;
    word-break:break-all;
}
.note-item-right{
    font-size:20px;
    color:var(--text-sub);
    padding:2px 16px;
    text-align:right;
    margin:2px 0 6px 0;
    word-break:break-all;
}

/* 移除底部分隔橫線 border-bottom */
.input-display{
    text-align:right;
    font-size:46px;
    line-height:1.15;
    padding:6px 16px 2px 16px;
    background:var(--bg-panel);
    color:var(--text-main);
    white-space:nowrap;
    overflow-x:auto;
    overflow-y:hidden;
    text-overflow:clip;
    scrollbar-width:none;
    -ms-overflow-style:none;
}
.input-display::-webkit-scrollbar{display:none;}

.keypad{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    grid-template-rows:88px 88px 88px 88px 88px;
    gap:1px;
    background:var(--grid-line);
    flex-shrink:0;
}
.key{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    cursor:pointer;
    user-select:none;
}
.key-num{
    color:var(--key-num-text);
    background:var(--key-num-bg);
}
.key-num:active{filter:brightness(0.95);}
.key-dark{
    color:var(--key-op-text);
    background:var(--key-op-bg);
}
.key-dark:active{filter:brightness(0.92);}
.key-zero{grid-column:span 2;grid-row:5;}
.key-equal{
    grid-column:4;
    grid-row:4 / span 2;
    background:var(--key-op-bg);
    color:var(--key-op-text);
}
.key-equal:active{filter:brightness(0.92);}

.popup-menu{
    position:fixed;
    bottom:0;left:0;right:0;
    background:#fff;
    color:#000;
    border-radius:16px 16px 0 0;
    z-index:99;
    transform:translateY(100%);
    transition:transform 0.3s ease;
    max-height:60vh;
    overflow-y:auto;
}
.popup-menu.show{transform:translateY(0);}
.popup-item{
    height:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}
.popup-item:active{background:#eee;}
#popCancel{border-top:6px solid #eee;}

.note-page{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:#fff;
    z-index:102;
    display:none;
    flex-direction:column;
}
.note-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    background:#1a1a1a;
    color:#fff;
    font-size:22px;
    flex-shrink:0;
}
.note-back,.note-done{
    font-size:20px;
    cursor:pointer;
    opacity:0.85;
}
.note-input-area{
    flex:1;
    display:flex;
    flex-direction:column;
    background:#fff;
    overflow:hidden;
}
.note-textarea{
    flex:1;
    padding:20px;
    font-size:20px;
    border:none;
    outline:none;
    resize:none;
    background:#fff;
    color:#000;
    text-align:right;
}
.note-tool-bar{
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:10px 0;
    border-top:1px solid #ddd;
    background:#fff;
    flex-shrink:0;
}
.note-tool-btn{
    width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;border-radius:8px;transition:background 0.2s;
}
.note-tool-btn:active{background:#f0f0f0;}
.note-tool-btn svg{width:28px;height:28px;fill:#333;}

.setting-page,.theme-page,.trash-page,.trash-detail-page{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:#111;
    z-index:100;
    display:none;
    overflow-y:auto;
}
.theme-page{z-index:101;}
.trash-page{z-index:103;background:#1a1a1a;}
.trash-detail-page{z-index:104;background:#f3f3f3;color:#111;}

.setting-header,.trash-header,.trash-detail-header{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:52px 20px 24px;
    border-bottom:1px solid #222;
}
.setting-header{background:#111;}
.trash-header{background:#111;color:#fff;}
.trash-detail-header{background:#111;color:#fff;}

.setting-back,.trash-back,.trash-detail-back,.trash-clear{
    position:absolute;
    top:52px;
    font-size:20px;
    cursor:pointer;
}
.setting-back,.trash-back,.trash-detail-back{left:20px;color:#fff;}
.trash-clear{right:20px;color:#fff;}
.setting-title,.trash-title,.trash-detail-title{
    font-size:22px;
    font-weight:500;
    color:#fff;
}
.setting-list{padding:0;}
.set-divider{height:1px;background:#222;margin:0;}

.setting-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    border-bottom:1px solid #222;
    font-size:19px;
    color:#fff;
    background:#111;
}
.setting-row:active{background:#1c1c1c;}
.setting-label{color:#fff;font-size:19px;}
.set-arrow{color:#888;font-size:18px;}

.switch{
    width:52px;height:32px;border-radius:16px;background:#444;position:relative;transition:0.2s;cursor:pointer;
}
.switch.on{background:#2cc940;}
.switch-dot{
    width:28px;height:28px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:0.2s;
}
.switch.on .switch-dot{left:22px;}

.theme-check{opacity:0;color:#2cc940;font-weight:700;}
.theme-row.active .theme-check{opacity:1;}

.mask{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.6);z-index:98;display:none;
}

.trash-list{background:#1a1a1a;}
.trash-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid #2a2a2a;
    color:#fff;
    cursor:pointer;
}
.trash-row:active{background:#242424;}
.trash-row-left{font-size:18px;}
.trash-row-right{
    display:flex;
    align-items:center;
    gap:10px;
    color:#8f8f8f;
    font-size:18px;
}
.trash-empty{
    color:#888;
    padding:28px 20px;
    text-align:center;
    font-size:18px;
}

.trash-detail-body{
    padding:18px 20px 110px;
    min-height:calc(100vh - 100px);
}
.trash-detail-date{
    color:#6e8c65;
    font-size:24px;
    margin-bottom:10px;
    text-align:right;
}
.trash-detail-item{
    font-size:22px;
    margin:6px 0;
    text-align:right;
    color:#111;
    word-break:break-all;
}
.trash-detail-note-left{
    font-size:22px;
    margin:6px 0;
    text-align:left;
    color:#7B8C9E;
    word-break:break-all;
}
.trash-detail-note-right{
    font-size:22px;
    margin:6px 0;
    text-align:right;
    color:#7B8C9E;
    word-break:break-all;
}
.trash-detail-footer{
    position:fixed;
    left:0;right:0;bottom:0;
    background:#f3f3f3;
    padding:18px 20px 30px;
    display:flex;
    gap:18px;
}
.trash-btn{
    flex:1;
    height:58px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}
.trash-btn.restore{background:#3f78ea;color:#fff;}
.trash-btn.delete{background:#e4e4e4;color:#111;}
</style>
</head>
<body>
<div id="app">
<svg class="setting-icon" viewBox="0 0 24 24">
  <path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.49.49 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/>

<div class="history-wrap" id="historyBox"></div>

</div>

<div class="mask" id="mask"></div>
<div class="popup-menu" id="popMenu">
  <div class="popup-item pop-insert-note">插入註解</div>
  <div class="popup-item pop-sum-all">加總</div>
  <div class="popup-item pop-copy-all">複製全部</div>
  <div class="popup-item pop-del-row">刪除該行</div>

</div>

      <div class="note-tool-btn" data-tool="right">
        <svg viewBox="0 0 24 24"><path d="M21 17H3v-2h18v2zm0-4H3v-2h18v2zm0-4H3V7h18v2zm-9-6v2h9V3h-9z"/></svg>

<div class="setting-page" id="settingPage">
<div class="setting-header">
<span class="setting-back" id="setBack">&lt;</span>
<span class="setting-title">設定</span>
</div>
<div class="setting-list">
    <div class="setting-row" data-page="sound">
        <div class="setting-label">音效</div>
        <div class="set-arrow">></div>
    </div>
    <div class="set-divider"></div>

    <div class="setting-row" data-page="theme">
        <div class="setting-label">主題</div>
        <div class="set-arrow">></div>
    </div>
    <div class="set-divider"></div>

    <div class="setting-row">
        <div class="setting-label">震動</div>
        <div class="switch on" id="switchVib">
            <div class="switch-dot"></div>
        </div>
    </div>
    <div class="set-divider"></div>

    <div class="setting-row" data-page="trash">
        <div class="setting-label">垃圾桶</div>

    </div>

</div>

<div class="theme-page" id="themePage">
  <div class="setting-header">
    <span class="setting-back" id="themeBack">&lt;</span>
    <span class="setting-title">主題</span>
  </div>
  <div class="setting-list">

    </div>

    <div class="setting-row theme-row" data-theme="light">
      <div class="setting-label">淺色</div>
      <div class="set-arrow theme-check">✓</div>
    </div>
    <div class="set-divider"></div>
    <div class="setting-row theme-row" data-theme="blue">
      <div class="setting-label">藍灰</div>
      <div class="set-arrow theme-check">✓</div>
    </div>
    <div class="set-divider"></div>
    <div class="setting-row theme-row" data-theme="pink-girl">
      <div class="setting-label">少女粉</div>
      <div class="set-arrow theme-check">✓</div>
    </div>
    <div class="set-divider"></div>
    <div class="setting-row theme-row" data-theme="purple-girl">
      <div class="setting-label">奶霜紫</div>

</div>

<script>
let exp = "";
let historyList = JSON.parse(localStorage.getItem('calcHistory')) || [];
let trashList = JSON.parse(localStorage.getItem('calcTrash')) || [];
let currentClickRow = null;
let activeHistoryDom = null;
let noteAlign = "right";
let isCalcDone = false;
let selectedTrashIndex = null;

const display = document.getElementById("display");
const historyBox = document.getElementById("historyBox");
const mask = document.getElementById("mask");
const popMenu = document.getElementById("popMenu");
const popCancel = document.getElementById("popCancel");
const settingPage = document.getElementById("settingPage");
const themePage = document.getElementById("themePage");
const trashPage = document.getElementById("trashPage");
const trashDetailPage = document.getElementById("trashDetailPage");
const trashListBox = document.getElementById("trashListBox");
const trashDetailBody = document.getElementById("trashDetailBody");
const trashDetailTitle = document.getElementById("trashDetailTitle");
const notePage = document.getElementById("notePage");
const noteInput = document.getElementById("noteInput");

const defaultSetting = {
    vib: true,
    theme: "dark"
};
let appSetting = {
    ...defaultSetting,
    ...(JSON.parse(localStorage.getItem('calcSetting')) || {})
};

function saveSetting(){ localStorage.setItem('calcSetting', JSON.stringify(appSetting)); }
function saveHistory(){ localStorage.setItem('calcHistory', JSON.stringify(historyList)); }
function saveTrash(){ localStorage.setItem('calcTrash', JSON.stringify(trashList)); }

function initSwitches(){
    const vibEl = document.getElementById('switchVib');
    appSetting.vib ? vibEl.classList.add('on') : vibEl.classList.remove('on');
}
initSwitches();

function applyTheme(theme){
    const root = document.documentElement;
    const body = document.body;
    const themeMap = {
        dark:{bgMain:'#232323',bgPanel:'#202020',textMain:'#ffffff',textSub:'#7B8C9E',keyNumBg:'#D5D5D5',keyNumText:'#000000',keyOpBg:'#708090',keyOpText:'#000000',gridLine:'#383838',activeRow:'#383838',settingIcon:'#ffffff'},
        light:{bgMain:'#f2f2f2',bgPanel:'#ffffff',textMain:'#111111',textSub:'#6f7d8a',keyNumBg:'#ffffff',keyNumText:'#111111',keyOpBg:'#cfd6dc',keyOpText:'#111111',gridLine:'#d8d8d8',activeRow:'#e8e8e8',settingIcon:'#222222'},
        blue:{bgMain:'#1d2630',bgPanel:'#24313d',textMain:'#ffffff',textSub:'#9fb0c1',keyNumBg:'#d9e0e6',keyNumText:'#0b1116',keyOpBg:'#708090',keyOpText:'#000000',gridLine:'#3a4651',activeRow:'#32414e',settingIcon:'#eaf3fb'},
        'pink-girl':{bgMain:'#f7dce5',bgPanel:'#fff3f7',textMain:'#6e3950',textSub:'#b06f8a',keyNumBg:'#fffafb',keyNumText:'#7a4058',keyOpBg:'#f4b6cc',keyOpText:'#6e2e4a',gridLine:'#efcade',activeRow:'#f8d9e8',settingIcon:'#8a4763'},
        'purple-girl':{bgMain:'#eee6fb',bgPanel:'#faf7ff',textMain:'#5b467c',textSub:'#8f7aac',keyNumBg:'#ffffff',keyNumText:'#5d497e',keyOpBg:'#d7c1f3',keyOpText:'#4f3a75',gridLine:'#e4daf3',activeRow:'#eadff8',settingIcon:'#634d86'},
        'mint-girl':{bgMain:'#dcf3ea',bgPanel:'#f3fffb',textMain:'#2f6658',textSub:'#6d9e92',keyNumBg:'#ffffff',keyNumText:'#2f6658',keyOpBg:'#bde7d7',keyOpText:'#28584c',gridLine:'#cfe8df',activeRow:'#d9f1e8',settingIcon:'#2f6f60'}
    };
    const cfg = themeMap[theme] || themeMap.dark;
    root.style.setProperty('--bg-main', cfg.bgMain);
    root.style.setProperty('--bg-panel', cfg.bgPanel);
    root.style.setProperty('--text-main', cfg.textMain);
    root.style.setProperty('--text-sub', cfg.textSub);
    root.style.setProperty('--key-num-bg', cfg.keyNumBg);
    root.style.setProperty('--key-num-text', cfg.keyNumText);
    root.style.setProperty('--key-op-bg', cfg.keyOpBg);
    root.style.setProperty('--key-op-text', cfg.keyOpText);
    root.style.setProperty('--grid-line', cfg.gridLine);
    root.style.setProperty('--active-row', cfg.activeRow);
    root.style.setProperty('--setting-icon-color', cfg.settingIcon);
    body.style.background = cfg.bgMain;
}
function renderThemeSelection(){
    document.querySelectorAll('.theme-row').forEach(row=>{
        row.classList.toggle('active', row.dataset.theme === appSetting.theme);
    });
}
applyTheme(appSetting.theme);
renderThemeSelection();

function triggerVibrate() {
    if(!appSetting.vib) return;
    if("vibrate" in navigator) navigator.vibrate(10);
}

function getFullTime(){
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,"0");
    const d = String(now.getDate()).padStart(2,"0");
    const h = String(now.getHours()).padStart(2,"0");
    const min = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    return `${y}-${m}-${d} ${h}:${min}:${s}`;
}
function getCurrentDateString(){
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth()+1).padStart(2,"0");
    const day = String(now.getDate()).padStart(2,"0");
    return `${year}年${month}月${day}日`;
}
function formatTrashDetailDate(fullTime){
    const [date] = fullTime.split(" ");
    const [y,m,d] = date.split("-");
    return `${y}年${m}月${d}日`;
}

function getUnitLabel(valueText){
    if(valueText === "" || valueText === "錯誤") return "";
    const num = Number(String(valueText).replace(/[^\d.-]/g, ""));
    if(!Number.isFinite(num)) return "";
    const abs = Math.abs(num);
    if(abs >= 100000000) return "(億)";
    if(abs >= 10000000) return "(千萬)";
    if(abs >= 1000000) return "(百萬)";
    if(abs >= 100000) return "(十萬)";
    if(abs >= 10000) return "(萬)";
    return "";
}
function addUnitToHistoryResult(rawText){
    return `${rawText}${getUnitLabel(rawText)}`;
}

function scrollDisplayToEnd(){
    requestAnimationFrame(()=>{
        display.scrollLeft = display.scrollWidth;
    });
}
function fitDisplayFont(){
    const maxFont = 46;
    const minFont = 24;
    let size = maxFont;
    display.style.fontSize = maxFont + "px";
    while(display.scrollWidth > display.clientWidth && size > minFont){
        size -= 1;
        display.style.fontSize = size + "px";
    }
}
function updateDisplayText(text){
    display.textContent = text || "0";
    fitDisplayFont();
    scrollDisplayToEnd();
}
function setDisplay(rawText){
    updateDisplayText(rawText || "0");
}
function setResultDisplay(rawText){
    updateDisplayText(rawText || "0");
}

function renderHistory(){
    historyBox.innerHTML = "";
    activeHistoryDom = null;
    if(historyList.length === 0) return;
    let date = getCurrentDateString();
    historyBox.innerHTML += `<div class="history-date">${date}</div>`;
    historyList.forEach((item, idx)=>{
        if(item.type === "calc"){
            let div = document.createElement("div");
            div.className = "history-item";
            div.dataset.row = idx;
            div.innerText = item.text;
            div.onclick = (e)=>{
                e.stopPropagation();
                if(activeHistoryDom) activeHistoryDom.classList.remove('active');
                div.classList.add('active');
                activeHistoryDom = div;
                currentClickRow = idx;
                showFullPopMenu();
            };
            historyBox.appendChild(div);
        }else if(item.type === "note"){
            let div = document.createElement("div");
            div.className = item.align === "left" ? "note-item-left" : "note-item-right";
            div.innerText = item.text;
            div.onclick = (e)=>{
                e.stopPropagation();
                if(activeHistoryDom) activeHistoryDom.classList.remove('active');
                activeHistoryDom = null;
                currentClickRow = idx;
                showFullPopMenu();
            };
            historyBox.appendChild(div);
        }
    });
    historyBox.scrollTop = historyBox.scrollHeight;
}
renderHistory();

function renderTrashList(){
    trashListBox.innerHTML = "";
    if(trashList.length === 0){
        trashListBox.innerHTML = `<div class="trash-empty">垃圾桶目前沒有資料</div>`;
        return;
    }
    trashList.forEach((group, idx)=>{
        const recentText = idx === 0 ? " (最近)" : "";
        const row = document.createElement("div");
        row.className = "trash-row";
        row.innerHTML = `
            <div class="trash-row-left">${group.time}${recentText}</div>
            <div class="trash-row-right">
                <span>${group.items.length}</span>
                <span>></span>
            </div>
        `;
        row.onclick = ()=>{
            selectedTrashIndex = idx;
            renderTrashDetail(idx);
            trashDetailPage.style.display = "block";
        };
        trashListBox.appendChild(row);
    });
}

function renderTrashDetail(idx){
    const data = trashList[idx];
    if(!data) return;
    trashDetailTitle.textContent = data.time;
    trashDetailBody.innerHTML = `<div class="trash-detail-date">${formatTrashDetailDate(data.time)}</div>`;
    data.items.forEach(item=>{
        const div = document.createElement("div");
        if(item.type === "calc"){
            div.className = "trash-detail-item";
            div.textContent = item.text;
        }else{
            div.className = item.align === "left" ? "trash-detail-note-left" : "trash-detail-note-right";
            div.textContent = item.text;
        }
        trashDetailBody.appendChild(div);
    });
}

function pushCurrentHistoryToTrash(){
    if(historyList.length === 0) return false;
    trashList.unshift({
        time: getFullTime(),
        items: JSON.parse(JSON.stringify(historyList))
    });
    saveTrash();
    return true;
}

function showFullPopMenu(){
    mask.style.display = "block";
    popMenu.classList.add('show');
    document.querySelector(".pop-del-row").style.display = "flex";
}
function showBackgroundPopMenu(){
    mask.style.display = "block";
    popMenu.classList.add('show');
    document.querySelector(".pop-del-row").style.display = "none";
}
function closePop(){
    mask.style.display = "none";
    popMenu.classList.remove('show');
    if(activeHistoryDom) activeHistoryDom.classList.remove('active');
    activeHistoryDom = null;
}
mask.onclick = closePop;
popCancel.onclick = closePop;

function copyText(text){
    navigator.clipboard.writeText(text).catch(()=>alert('複製失敗'));
}

function parseHistoryResultToNumber(text){
    const str = String(text || "").trim();
    const eqIndex = str.indexOf("=");
    if(eqIndex === -1) return null;

    const resultPart = str.slice(eqIndex + 1).trim();
    const noUnitText = resultPart.replace(/\\([^)]\*\\)/g, "").trim();
    const pureNumberText = noUnitText.replace(/[^\d.-]/g, "").trim();

    if(!pureNumberText) return null;

    const resultNum = Number(pureNumberText);
    return Number.isFinite(resultNum) ? resultNum : null;
}

function sumAllCalc(){
    let total = 0;
    historyList.forEach(item=>{
        if(item.type !== "calc") return;
        const resultNum = parseHistoryResultToNumber(item.text);
        if(resultNum !== null){
            total += resultNum;
        }
    });
    exp = String(total);
    setResultDisplay(exp);
    isCalcDone = true;
}

document.querySelectorAll(".popup-item").forEach(item=>{
    item.onclick = function(){
        const act = this.className;
        if(act.includes("pop-insert-note")){
            noteInput.value = "";
            noteInput.style.textAlign = noteAlign;
            notePage.style.display = "flex";
            setTimeout(()=>noteInput.focus(), 100);
        }else if(act.includes("pop-sum-all")){
            sumAllCalc();
            currentClickRow = null;
        }else if(act.includes("pop-copy-all")){
            const calcTexts = historyList.filter(i=>i.type==="calc").map(i=>i.text);
            copyText(calcTexts.join("\n"));
            currentClickRow = null;
        }else if(act.includes("pop-del-row")){
            if(currentClickRow !== null){
                historyList.splice(currentClickRow,1);
                saveHistory();
                renderHistory();
            }
            currentClickRow = null;
        }else if(act.includes("pop-clear-all")){
            if(historyList.length === 0){
                alert("目前沒有資料可清除");
            }else{
                pushCurrentHistoryToTrash();
                historyList = [];
                exp = "";
                setDisplay("0");
                isCalcDone = false;
                saveHistory();
                renderHistory();
                renderTrashList();
            }
            currentClickRow = null;
        }
        closePop();
    };
});

document.querySelectorAll(".note-tool-btn").forEach(btn=>{
    btn.onclick = async function(){
        const tool = this.dataset.tool;
        if(tool === "time") noteInput.value += getFullTime();
        if(tool === "clip"){
            try{
                const clipText = await navigator.clipboard.readText();
                noteInput.value += clipText;
            }catch(e){
                alert("無法讀取剪貼簿，請手動貼上");
            }
        }
        if(tool === "left"){
            noteAlign = "left";
            noteInput.style.textAlign = "left";
        }
        if(tool === "right"){
            noteAlign = "right";
            noteInput.style.textAlign = "right";
        }
        noteInput.focus();
    };
});

document.querySelector(".note-done").onclick = ()=>{
    const noteText = noteInput.value.trim();
    if(!noteText){
        alert("請輸入註解內容");
        return;
    }
    const noteObj = {
        type:"note",
        text:noteText,
        align:noteAlign
    };
    if(currentClickRow !== null){
        historyList.splice(currentClickRow + 1, 0, noteObj);
    }else{
        historyList.push(noteObj);
    }
    saveHistory();
    renderHistory();
    notePage.style.display = "none";
    currentClickRow = null;
};

document.querySelector(".note-back").onclick = ()=>{
    notePage.style.display = "none";
};

historyBox.onclick = (e)=>{
    if(e.target === historyBox){
        if(activeHistoryDom) activeHistoryDom.classList.remove('active');
        activeHistoryDom = null;
        currentClickRow = null;
        showBackgroundPopMenu();
    }
};

document.querySelectorAll(".key").forEach(key=>{
    key.onclick = ()=>{
        const val = key.dataset.val;
        const opMap = {"+":"+","-":"-","/":"÷","mul":"×"};
        const opKeys = Object.keys(opMap);

        if(!isNaN(Number(val)) || val === ".") triggerVibrate();

        if(val === "C"){
            exp = "";
            setDisplay("0");
            isCalcDone = false;
            return;
        }

        if(val === "back"){
            if(isCalcDone){
                exp = "";
                setDisplay("0");
                isCalcDone = false;
            }else{
                exp = exp.slice(0,-1);
                setDisplay(exp || "0");
            }
            return;
        }

        if(val === "="){
            if(!exp) return;
            let tempExp = exp;
            while(opKeys.some(k=>tempExp.endsWith(opMap[k]))){
                tempExp = tempExp.slice(0,-1);
            }
            if(!tempExp){
                setDisplay("0");
                exp = "";
                isCalcDone = false;
                return;
            }
            try{
                let calcExp = tempExp.replace(/×/g,"*").replace(/÷/g,"/");
                let res = Function('"use strict";return (' + calcExp + ')')();
                if(!Number.isFinite(res)) throw new Error("Invalid result");

                let showRes = Number.isInteger(res)
                    ? String(res)
                    : res.toFixed(6).replace(/\.?0+$/,"");

                let recordText = `${tempExp}=${addUnitToHistoryResult(showRes)}`;
                historyList.push({type:"calc", text:recordText});
                saveHistory();
                renderHistory();

                setResultDisplay(showRes);
                exp = String(res);
                isCalcDone = true;
            }catch(e){
                updateDisplayText("錯誤");
                exp = "";
                isCalcDone = false;
            }
            return;
        }

        if(opKeys.includes(val)){
            const showOp = opMap[val];
            if(isCalcDone){
                exp = String(exp) + showOp;
            }else{
                if(exp.trim() === ""){
                    exp = "0" + showOp;
                }else{
                    const lastChar = exp.slice(-1);
                    if(Object.values(opMap).includes(lastChar)){
                        exp = exp.slice(0,-1) + showOp;
                    }else{
                        exp += showOp;
                    }
                }
            }
            setDisplay(exp);
            isCalcDone = false;
            return;
        }

        if(!isNaN(Number(val)) || val === "."){
            if(isCalcDone){
                exp = "";
                isCalcDone = false;
            }
            exp += val;
            setDisplay(exp);
        }
    };
});

document.querySelector(".setting-icon").onclick = ()=>{
    settingPage.style.display = "block";
};
document.getElementById("setBack").onclick = ()=>{
    settingPage.style.display = "none";
    themePage.style.display = "none";
    trashPage.style.display = "none";
};
document.getElementById("themeBack").onclick = ()=>{
    themePage.style.display = "none";
};

document.getElementById("trashBack").onclick = ()=>{
    trashPage.style.display = "none";
};
document.getElementById("trashDetailBack").onclick = ()=>{
    trashDetailPage.style.display = "none";
};

document.getElementById("restoreTrashBtn").onclick = ()=>{
    if(selectedTrashIndex === null || !trashList[selectedTrashIndex]) return;
    historyList = JSON.parse(JSON.stringify(trashList[selectedTrashIndex].items));
    saveHistory();
    trashList.splice(selectedTrashIndex,1);
    saveTrash();
    renderHistory();
    renderTrashList();
    trashDetailPage.style.display = "none";
    trashPage.style.display = "none";
};

document.getElementById("deleteTrashBtn").onclick = ()=>{
    if(selectedTrashIndex === null || !trashList[selectedTrashIndex]) return;
    trashList.splice(selectedTrashIndex,1);
    saveTrash();
    renderTrashList();
    trashDetailPage.style.display = "none";
};

document.getElementById("trashClearAll").onclick = ()=>{
    if(trashList.length === 0){
        alert("垃圾桶目前沒有資料");
        return;
    }
    if(confirm("確定要清空垃圾桶嗎？")){
        trashList = [];
        saveTrash();
        renderTrashList();
        trashDetailPage.style.display = "none";
    }
};

document.getElementById("switchVib").onclick = (e)=>{
    e.stopPropagation();
    appSetting.vib = !appSetting.vib;
    saveSetting();
    initSwitches();
};

document.querySelectorAll(".setting-row[data-page]").forEach(row=>{
    row.onclick = function(){
        const pageType = this.dataset.page;
        if(pageType === "theme"){
            renderThemeSelection();
            themePage.style.display = "block";
            return;
        }
        if(pageType === "sound"){
            alert("音效設定頁可再另外補上");
            return;
        }
        if(pageType === "trash"){
            renderTrashList();
            trashPage.style.display = "block";
            return;
        }
    };
});

document.querySelectorAll(".theme-row").forEach(row=>{
    row.onclick = ()=>{
        appSetting.theme = row.dataset.theme;
        saveSetting();
        applyTheme(appSetting.theme);
        renderThemeSelection();
    };
});

renderTrashList();
setDisplay("0");
</script>
