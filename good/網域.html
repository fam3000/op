<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GitHub Pages 連結生成器</title>
<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body{
    font-family: -apple-system, Arial, sans-serif;
    background:#111;
    color:#fff;
    padding: 24px 16px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}
.container{
    width:100%;
    max-width: 480px;
    padding:28px 24px;
    background:#222;
    border-radius:14px;
}
h3{
    text-align:center;
    margin-bottom:24px;
    color:#00c896;
    font-size:22px;
}
.input-wrap{
    display:flex;
    gap:10px;
    margin:10px 0;
}
.input-wrap input{
    flex:1;
    padding:14px 12px;
    border-radius:8px;
    border:none;
    background:#333;
    color:#fff;
    font-size:17px;
}
.clear-btn{
    width:48px;
    padding:0;
    background:#444;
    border:none;
    color:#ff6b6b;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
}
.clear-btn:active{
    background:#555;
}
#genBtn{
    width:100%;
    padding:16px;
    margin-top:16px;
    background:#00c896;
    border:none;
    color:#000;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    font-size:17px;
}
#genBtn:active{
    background:#00e0a8;
}
.result{
    margin-top:18px;
    word-break:break-all;
    background:#000;
    padding:14px 12px;
    border-radius:8px;
    line-height:1.7;
    font-size:16px;
}
.result a{
    color:#00c896;
    text-decoration: none;
}
.result a:active{
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
    <h3>GitHub Pages 產生器</h3>

    <div class="input-wrap">
        <input id="user" placeholder="1. GitHub帳號 (例: fam3000)">
        <button class="clear-btn" onclick="clearInput('user')">X</button>
    </div>
    <div class="input-wrap">
        <input id="repo" placeholder="2. 倉庫名 (例: op)">
        <button class="clear-btn" onclick="clearInput('repo')">X</button>
    </div>
    <div class="input-wrap">
        <input id="folder" placeholder="3. 資料夾 (例: right)">
        <button class="clear-btn" onclick="clearInput('folder')">X</button>
    </div>
    <div class="input-wrap">
        <input id="file" placeholder="4. HTML檔名 (例: index.html)">
        <button class="clear-btn" onclick="clearInput('file')">X</button>
    </div>

    <button id="genBtn" onclick="gen()">產生連結</button>

    <div class="result" id="out"></div>
</div>

<script>
// 頁面載入優先讀取本地儲存，無紀錄才載入預設值
window.onload = function(){
    const fields = ['user','repo','folder','file'];
    // 預設初始值：前三欄預填範例，第四欄空白
    const defaultVals = {
        user: 'fam3000',
        repo: 'op',
        folder: 'right',
        file: ''
    };

    fields.forEach(key=>{
        const saved = localStorage.getItem(`input_${key}`);
        const el = document.getElementById(key);
        if(saved !== null){
            // 有上次儲存紀錄就優先使用
            el.value = saved;
        }else{
            // 無紀錄使用預設值
            el.value = defaultVals[key];
        }
    })

    // 回填上次產生的連結
    const lastUrl = localStorage.getItem('lastGhUrl');
    if(lastUrl){
        document.getElementById("out").innerHTML = `<a href="${lastUrl}" target="_blank">${lastUrl}</a>`;
    }
}

// 單獨清除指定輸入框
function clearInput(id){
    const inputEl = document.getElementById(id);
    inputEl.value = '';
    localStorage.removeItem(`input_${id}`);
}

// 生成連結主函數
function gen(){
    let user = document.getElementById("user").value.trim();
    let repo = document.getElementById("repo").value.trim();
    let folder = document.getElementById("folder").value.trim();
    let file = document.getElementById("file").value.trim();

    if(!user || !repo || !file){
        alert('請至少填寫帳號、倉庫、檔名');
        return;
    }

    // 儲存本次所有輸入到localStorage，下次開啟自動載入最後一次內容
    localStorage.setItem('input_user', user);
    localStorage.setItem('input_repo', repo);
    localStorage.setItem('input_folder', folder);
    localStorage.setItem('input_file', file);

    // 組合網址，空資料夾不會多出斜線
    let path = folder ? `${folder}/` : '';
    let url = `https://${user}.github.io/${repo}/${path}${file}`;
    document.getElementById("out").innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
    localStorage.setItem('lastGhUrl', url);
}
</script>
</body>
</html>
