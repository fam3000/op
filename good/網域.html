<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>GitHub Pages 連結生成器</title>
<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body{
    font-family: Arial;
    background:#111;
    color:#fff;
    padding: 20px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:360px;
    padding:24px;
    background:#222;
    border-radius:12px;
}
h3{
    text-align:center;
    margin-bottom:20px;
    color:#00c896;
    font-size:20px;
}
.input-wrap{
    display:flex;
    gap:8px;
    margin:8px 0;
}
.input-wrap input{
    flex:1;
    padding:9px;
    border-radius:6px;
    border:none;
    background:#333;
    color:#fff;
    font-size:14px;
}
.clear-btn{
    width:42px;
    padding:0;
    background:#444;
    border:none;
    color:#ff6b6b;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
.clear-btn:hover{
    background:#555;
}
#genBtn{
    width:100%;
    padding:11px;
    margin-top:12px;
    background:#00c896;
    border:none;
    color:#000;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}
#genBtn:hover{
    background:#00e0a8;
}
.result{
    margin-top:14px;
    word-break:break-all;
    background:#000;
    padding:10px;
    border-radius:6px;
    line-height:1.6;
}
.result a{
    color:#00c896;
    text-decoration: none;
}
.result a:hover{
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
    <h3>GitHub Pages 產生器</h3>

    <div class="input-wrap">
        <input id="user" placeholder="1. GitHub帳號 (例: fam3000)">
        <button class="clear-btn" onclick="clearInput('user')">X</button>
    </div>
    <div class="input-wrap">
        <input id="repo" placeholder="2. 倉庫名 (例: op)">
        <button class="clear-btn" onclick="clearInput('repo')">X</button>
    </div>
    <div class="input-wrap">
        <input id="folder" placeholder="3. 資料夾 (例: right)">
        <button class="clear-btn" onclick="clearInput('folder')">X</button>
    </div>
    <div class="input-wrap">
        <input id="file" placeholder="4. HTML檔名 (例: index.html)">
        <button class="clear-btn" onclick="clearInput('file')">X</button>
    </div>

    <button id="genBtn" onclick="gen()">產生連結</button>

    <div class="result" id="out"></div>
</div>

<script>
// 頁面載入讀取所有輸入紀錄 + 上次連結
window.onload = function(){
    // 回填各欄上次輸入
    const fields = ['user','repo','folder','file'];
    fields.forEach(key=>{
        const val = localStorage.getItem(`input_${key}`);
        if(val) document.getElementById(key).value = val;
    })
    // 回填上次產生的連結
    const lastUrl = localStorage.getItem('lastGhUrl');
    if(lastUrl){
        document.getElementById("out").innerHTML = `<a href="${lastUrl}" target="_blank">${lastUrl}</a>`;
    }
}

// 單獨清除指定輸入框
function clearInput(id){
    const inputEl = document.getElementById(id);
    inputEl.value = '';
    localStorage.removeItem(`input_${id}`);
}

// 生成連結主函數
function gen(){
    let user = document.getElementById("user").value.trim();
    let repo = document.getElementById("repo").value.trim();
    let folder = document.getElementById("folder").value.trim();
    let file = document.getElementById("file").value.trim();

    if(!user || !repo || !file){
        alert('請至少填寫帳號、倉庫、檔名');
        return;
    }

    // 儲存每一格輸入內容到localStorage
    localStorage.setItem('input_user', user);
    localStorage.setItem('input_repo', repo);
    localStorage.setItem('input_folder', folder);
    localStorage.setItem('input_file', file);

    // 組合網址
    let url = `https://${user}.github.io/${repo}/${folder}/${file}`;
    document.getElementById("out").innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
    localStorage.setItem('lastGhUrl', url);
}
</script>
</body>
</html>
