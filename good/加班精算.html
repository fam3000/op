<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>加班費精算機</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#f0f2f5}
.container{max-width:390px;margin:0 auto;background:#fff;padding:16px;min-height:100vh}
h1{font-size:20px;text-align:center;margin-bottom:16px}

/* 左右並排專用列 */
.row-flex{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.col-half{
    flex:1;
}
/* 基本時薪 + 日期 統一高度大小，完全對齊 */
.row-flex input{
    width:100%;
    height:44px;
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
    margin-bottom:0;
}

label{font-size:14px;margin-bottom:4px;display:block}
/* 單行輸入框維持原本樣式 */
input:not(.row-flex input){
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:10px;font-size:16px
}
input[type="date"]{background:#fff;color:#000}
.type-group{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.type-btn{padding:10px 6px;border-radius:8px;font-size:14px;border:none;background:#eee;color:#333}
.type-btn.active{background:#3498db;color:#fff}
.type-rest.active{background:#27ae60;color:#fff}
.type-holiday.active{background:#e67e22;color:#fff}
.btn-group{display:flex;gap:8px;margin-bottom:16px}
button{flex:1;padding:12px;border:none;border-radius:8px;background:#3498db;color:#fff;font-size:16px}
.btn-reset-all{background:#c0392b}
.btn-history{background:#27ae60}
.btn-del{background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 8px;font-size:13px}
h2{font-size:16px;margin-bottom:8px}
table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:14px}
th,td{border:1px solid #eee;padding:8px;text-align:center}
th{background:#f5f7fa}
.total{background:#f8f9fa;padding:12px;border-radius:8px;font-weight:bold;color:#e74c3c}
.festival{font-size:12px;color:#e67e22;margin-bottom:10px;min-height:18px}
.day-stat{color:#0066cc;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line}
.small-note{font-size:12px;color:#666;margin-top:8px;line-height:1.6;white-space:pre-line}
.summary-line{margin-top:4px;font-size:14px;color:#333;line-height:1.6}
/* 歷史紀錄面板 */
.history-panel{
  margin-top:16px;
  padding:12px;
  background:#edf7ff;
  border-radius:8px;
  display:none;
}
.month-block{
  margin-bottom:10px;
  padding:8px;
  border-bottom:1px solid #cce5ff;
}
/* 薪資設定區塊邊框 */
.setting-box{
  border:1px solid #b8d4f2;
  border-radius:10px;
  padding:12px;
  margin-bottom:14px;
  background:#f7fbff;
}
.setting-box h3{
  font-size:15px;
  margin-bottom:10px;
  color:#225599;
}
</style>
</head>
<body>
<div class="container">
    <h1>加班費精算機</h1>

    <!-- 自訂薪資區間+領薪日設定框 -->
    <div class="setting-box">
        <h3>⚙️ 薪資週期自訂設定</h3>
        <div class="row-flex">
            <div class="col-half">
                <label>薪資週起始日 (每月)</label>
                <input type="number" id="periodStartDay" min="1" max="31" value="25">
            </div>
            <div class="col-half">
                <label>薪資週結束日 (每月)</label>
                <input type="number" id="periodEndDay" min="1" max="31" value="24">
            </div>
        </div>
        <label>每月領薪日</label>
        <input type="number" id="payDay" min="1" max="31" value="5">
    </div>

    <!-- 基本時薪 + 日期 同列左右 -->
    <div class="row-flex">
        <div class="col-half">
            <label>基本時薪</label>
            <input type="number" id="wage" value="215">
        </div>
        <div class="col-half">
            <label>日期</label>
            <input type="date" id="date">
        </div>
    </div>

    <div class="festival" id="festival"></div>

    <label>加班類型</label>
    <div class="type-group">
        <button class="type-btn type-weekday" onclick="selectType('weekday')">平日</button>
        <button class="type-btn type-rest" onclick="selectType('rest')">休息日</button>
        <button class="type-btn type-holiday" onclick="selectType('holiday')">國定假日</button>
    </div>

    <!-- 加班時數 + 請假時數 同列左右 -->
    <div class="row-flex">
        <div class="col-half">
            <label>加班時數</label>
            <input type="number" id="hours" step="0.5" placeholder="平日可留空或填0">
        </div>
        <div class="col-half">
            <label>請假時數</label>
            <input type="number" id="leaveHours" step="0.5" placeholder="可輸入 0.5、1、2、8">
        </div>
    </div>

    <div class="btn-group">
        <button onclick="add()">新增</button>
        <button class="btn-reset-all" onclick="resetAll()">重置紀錄</button>
        <button class="btn-history" onclick="showHistory()">歷史紀錄</button>
    </div>

    <h2>明細</h2>
    <table>
        <tr><th>日期</th><th>加班</th><th>請假</th><th>類</th><th>金額</th><th>刪除</th></tr>
        <tbody id="list"></tbody>
    </table>

    <div class="total">
        平日工資：<span id="baseTotal">0.0000</span><br>
        加班費：<span id="otTotal">0.0000</span><br>
        請假扣款：<span id="leaveTotal">0.0000</span><br>
        結算金額：<span id="final">0</span>
        <div class="dayStat" id="dayStat"></div>
        <div class="summary-line" id="hourStat"></div>
        <div class="small-note">
備註：
可上方設定框自訂薪資週區間與領薪日，
修改設定後計算明細自動同步更新；
加班分平日、休息日、國定假日三種計價規則，
平日工資表定固定1720，若時數有少，用請假方式扣除
平日正常上班、無加班、無請假、時數填0即可。
        </div>
    </div>

    <!-- 每月歷史明細面板 -->
    <div class="history-panel" id="historyPanel">
      <h3 style="margin-bottom:10px">📅 每月薪資明細</h3>
      <div id="monthHistoryList"></div>
    </div>
</div>

<script>
const TW_HOLIDAYS = {
  "2025-01-01":"元旦","2025-01-28":"除夕","2025-01-29":"春節","2025-01-30":"春節","2025-01-31":"春節","2025-02-01":"春節","2025-02-02":"春節","2025-02-03":"春節","2025-02-04":"春節","2025-02-28":"和平紀念日","2025-04-04":"兒童節/清明","2025-05-01":"勞動節","2025-05-31":"端午節","2025-09-28":"教師節","2025-10-06":"中秋節","2025-10-10":"國慶日","2025-10-25":"光復節","2025-12-25":"行憲紀念日",
  "2026-01-01":"元旦","2026-02-14":"春節","2026-02-15":"春節","2026-02-16":"除夕","2026-02-17":"春節","2026-02-18":"春節","2026-02-19":"春節","2026-02-20":"春節","2026-02-21":"春節","2026-02-22":"春節","2026-02-28":"和平紀念日","2026-04-03":"清明","2026-04-04":"兒童節","2026-04-05":"清明","2026-05-01":"勞動節","2026-06-19":"端午節","2026-09-25":"中秋節","2026-09-28":"教師節","2026-10-10":"國慶日","2026-10-25":"光復節","2026-12-25":"行憲紀念日"
};

let data = [];
let selectedType = 'weekday';
let lastHours = '';
let lastLeaveHours = '';

const typeShort = {weekday:'平', rest:'休', holiday:'國'};
const typeClass = {weekday:'type-weekday', rest:'type-rest', holiday:'type-holiday'};

// 讀取本地儲存全部資料
function loadData() {
  const saved = localStorage.getItem('overtimeData_final');
  if (saved) {
    try { data = JSON.parse(saved); } catch(e) { data = []; }
  }
  const savedWage = localStorage.getItem('defaultWage');
  if (savedWage) document.getElementById('wage').value = savedWage;
  // 載入自訂週期設定
  const savedStart = localStorage.getItem('periodStartDay');
  const savedEnd = localStorage.getItem('periodEndDay');
  const savedPay = localStorage.getItem('payDay');
  if(savedStart) document.getElementById('periodStartDay').value = savedStart;
  if(savedEnd) document.getElementById('periodEndDay').value = savedEnd;
  if(savedPay) document.getElementById('payDay').value = savedPay;
  show();
}

// 儲存紀錄+自訂設定
function saveData() {
  localStorage.setItem('overtimeData_final', JSON.stringify(data));
  localStorage.setItem('defaultWage', document.getElementById('wage').value);
  localStorage.setItem('periodStartDay', document.getElementById('periodStartDay').value);
  localStorage.setItem('periodEndDay', document.getElementById('periodEndDay').value);
  localStorage.setItem('payDay', document.getElementById('payDay').value);
}

function checkDate(ymd) {
  const [y,m,d] = ymd.split('-');
  const dt = new Date(y, m-1, d);
  const day = dt.getDay();
  const isWeekend = (day === 0 || day === 6);
  const holidayName = TW_HOLIDAYS[ymd] || '';
  const isHoliday = !!holidayName;
  return { isWeekend, isHoliday, holidayName };
}

function compareDate(a, b) {
  return a.d.localeCompare(b.d);
}

// 日期切換自動判斷假日類型
document.getElementById('date').addEventListener('change', function() {
  const ymd = this.value;
  if (!ymd) return;
  const { isWeekend, isHoliday, holidayName } = checkDate(ymd);
  document.getElementById('festival').textContent = holidayName ? `🎊 ${holidayName}` : '';
  let autoType = 'weekday';
  if (isHoliday) autoType = 'holiday';
  else if (isWeekend) autoType = 'rest';
  selectType(autoType);
  show();
});

// 自訂週期輸入變更即時重算
document.getElementById('periodStartDay').addEventListener('input',()=>{saveData();show();});
document.getElementById('periodEndDay').addEventListener('input',()=>{saveData();show();});
document.getElementById('payDay').addEventListener('input',()=>{saveData();show();});
document.getElementById('wage').addEventListener('input',()=>{saveData();show();});

// 預設今日日期
const today = new Date();
const todayYmd = today.getFullYear() + '-' +
  String(today.getMonth()+1).padStart(2,'0') + '-' +
  String(today.getDate()).padStart(2,'0');
document.getElementById('date').value = todayYmd;
document.getElementById('date').dispatchEvent(new Event('change'));

function selectType(t) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.${typeClass[t]}`).classList.add('active');
}

// 加班費計算邏輯
function calcOT(hourly, h, type) {
  h = parseFloat(h)||0;
  hourly = parseFloat(hourly)||0;
  if(type === 'weekday'){
    const p1 = Math.min(h,2); const p2 = Math.max(h-2,0);
    return p1*hourly*1.334 + p2*hourly*1.667;
  }
  if(type === 'rest'){
    const p1 = Math.min(h,2); const p2 = Math.min(Math.max(h-2,0),6); const p3 = Math.max(h-8,0);
    return p1*hourly*1.334 + p2*hourly*1.667 + p3*hourly*2.667;
  }
  if(type === 'holiday'){
    const p1 = Math.min(h,8); const p2 = Math.min(Math.max(h-8,0),2); const p3 = Math.max(h-10,0);
    return p1*hourly*2.0 + p2*hourly*1.334 + p3*hourly*1.667;
  }
  return 0;
}

// 日期格式化
function formatDate(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// 【自訂參數】取得當下日期所屬薪資週期
function getPeriod(dateStr) {
  const startDay = Number(document.getElementById('periodStartDay').value) || 25;
  const endDay = Number(document.getElementById('periodEndDay').value) || 24;
  const base = dateStr ? new Date(dateStr + "T00:00:00") : new Date();
  const y = base.getFullYear();
  const mIdx = base.getMonth();
  const currentDate = base.getDate();

  if(currentDate >= startDay){
    return {
      start: new Date(y, mIdx, startDay),
      end: new Date(y, mIdx + 1, endDay)
    }
  }else{
    return {
      start: new Date(y, mIdx - 1, startDay),
      end: new Date(y, mIdx, endDay)
    }
  }
}

// 【自訂參數】取得領薪日
function getPayday(endDate) {
  const payDay = Number(document.getElementById('payDay').value) || 5;
  return new Date(endDate.getFullYear(), endDate.getMonth() + 1, payDay);
}

function inPeriod(ymd, start, end) {
  const target = new Date(ymd + "T00:00:00");
  return target >= start && target <= end;
}

function countTotalDays(start, end) {
  const msPerDay = 24 * 60 * 60 * 1000;
  return Math.round((end - start) / msPerDay) + 1;
}

// 統計區間內所有天數類型
function calcAllDayTypeCount(start, end) {
  let wd = 0, rt = 0, hd = 0;
  let current = new Date(start);
  while (current <= end) {
    const ymd = formatDate(current);
    const info = checkDate(ymd);
    if (info.isHoliday) hd++;
    else if (info.isWeekend) rt++;
    else wd++;
    current.setDate(current.getDate() + 1);
  }
  return { allWeekday: wd, allRest: rt, allHoliday: hd };
}

// 全域重置：只清空所有加班紀錄，保留設定、時薪
function resetAll(){
  if(!confirm('確定要刪除全部已新增加班紀錄？薪資設定與時薪將保留')) return;
  data = [];
  saveData();
  show();
  document.getElementById('hours').value = '';
  document.getElementById('leaveHours').value = '';
}

// 新增加班紀錄
function add() {
  const d = document.getElementById('date').value;
  const t = selectedType;
  let h = document.getElementById('hours').value.trim();
  let leaveH = document.getElementById('leaveHours').value.trim();
  const wage = document.getElementById('wage').value;

  if(!d) return alert('請選擇日期');

  if(t === 'weekday'){
    if(h === '' || isNaN(parseFloat(h))) h = '0';
  } else {
    if(!h || isNaN(parseFloat(h)) || parseFloat(h) <= 0) return alert('休息日/國定假日請輸入加班時數');
  }

  if(leaveH === '' || isNaN(parseFloat(leaveH))) leaveH = '0';

  lastHours = h;
  lastLeaveHours = leaveH;

  const hourly = parseFloat(wage) || 0;
  const ot = calcOT(hourly, h, t);
  const leaveDeduct = hourly * parseFloat(leaveH);

  data.push({ d, t, h, leaveH, ot, leaveDeduct });
  data.sort(compareDate);
  saveData();
  show();

  // 新增後清空加班、請假輸入框
  document.getElementById('hours').value = '';
  document.getElementById('leaveHours').value = '';
}

// 主畫面渲染函數
function show() {
  const tb = document.getElementById('list');
  tb.innerHTML='';
  let sumOT = 0, sumBase = 0, sumLeave = 0;
  let cntWeekday = 0, cntRest = 0, cntHoliday = 0;
  let totalWeekdayHours = 0, totalOTHours = 0;
  const wage = parseFloat(document.getElementById('wage').value) || 0;
  const { start, end } = getPeriod(document.getElementById('date').value);
  const payday = getPayday(end);
  const totalDays = countTotalDays(start, end);

  const allCount = calcAllDayTypeCount(start, end);
  const listInRange = data.filter(item => inPeriod(item.d, start, end));
  const workTotal = listInRange.length;
  const noWorkTotal = totalDays - workTotal;

  listInRange.forEach(item => {
    const ot = Number(item.ot) || 0;
    const leaveDeduct = Number(item.leaveDeduct) || 0;
    const hours = Number(item.h) || 0;

    sumOT += ot;
    sumLeave += leaveDeduct;

    let showAmount = ot;
    if (item.t === 'weekday') {
      showAmount = wage * 8 + ot - leaveDeduct;
      totalWeekdayHours += hours;
    } else {
      totalOTHours += hours;
    }

    tb.innerHTML += `
    <tr>
      <td>${item.d}</td>
      <td>${item.h || 0}</td>
      <td>${item.leaveH || 0}</td>
      <td>${typeShort[item.t]}</td>
      <td>${showAmount.toFixed(4)}</td>
      <td><button class="btn-del" onclick="del(${data.indexOf(item)})">刪</button></td>
    </tr>`;

    if(item.t === 'weekday') {
      sumBase += wage * 8;
      cntWeekday++;
    } else if(item.t === 'rest') {
      cntRest++;
    } else if(item.t === 'holiday') {
      cntHoliday++;
    }
  });

  const finalPay = sumBase + sumOT - sumLeave;

  document.getElementById('baseTotal').innerText = sumBase.toFixed(4);
  document.getElementById('otTotal').innerText = sumOT.toFixed(4);
  document.getElementById('leaveTotal').innerText = sumLeave.toFixed(4);
  document.getElementById('final').innerText = Math.round(finalPay);

  document.getElementById('dayStat').innerText =
`薪資區間：${formatDate(start)} ～ ${formatDate(end)}
領薪日：${formatDate(payday)}
區間總天數：${totalDays}天
｜平日${allCount.allWeekday}｜休假日${allCount.allRest}｜國定假日${allCount.allHoliday}
實際出勤：${workTotal}天｜未上班：${noWorkTotal}天`;

  document.getElementById('hourStat').innerText =
`平日加班總時數：${totalWeekdayHours}
休息/國定加班總時數：${totalOTHours}`;
}

// ========== 徹底修復：歷史紀錄點擊100%有效 ==========
function showHistory(){
  const panel = document.getElementById('historyPanel');
  const listEl = document.getElementById('monthHistoryList');

  // 直接切換顯示/隱藏，手機絕對不會失效
  if(panel.style.display === 'block'){
    panel.style.display = 'none';
    return;
  }

  // 顯示時重新渲染
  panel.style.display = 'block';
  listEl.innerHTML = '';

  const groupMap = {};
  data.forEach(item=>{
    const p = getPeriod(item.d);
    const key = `${formatDate(p.start)} ~ ${formatDate(p.end)}`;
    if(!groupMap[key]) groupMap[key] = [];
    groupMap[key].push(item);
  });

  const wage = parseFloat(document.getElementById('wage').value)||0;
  const keys = Object.keys(groupMap);

  if(keys.length === 0){
    listEl.innerHTML = '<div style="text-align:center;color:#666;padding:10px">尚無歷史加班紀錄</div>';
    return;
  }

  // 新到舊排序
  keys.sort((a,b)=> b.localeCompare(a));

  keys.forEach(period=>{
    const items = groupMap[period];
    let sBase=0,sOT=0,sLeave=0;
    items.forEach(it=>{
      sOT += Number(it.ot)||0;
      sLeave += Number(it.leaveDeduct)||0;
      if(it.t==='weekday') sBase += wage*8;
    });
    const total = sBase + sOT - sLeave;

    const div = document.createElement('div');
    div.className = 'month-block';
    div.innerHTML = `
      <strong>${period}</strong><br>
      平日工資：${sBase.toFixed(2)}｜加班費：${sOT.toFixed(2)}｜請假扣款：${sLeave.toFixed(2)}<br>
      結算金額：<b style="color:#e74c3c">${Math.round(total)}</b>
    `;
    listEl.appendChild(div);
  });
}

// 單筆刪除紀錄
function del(i){
  data.splice(i,1);
  saveData();
  show();
  // 歷史開著就自動刷新
  if(document.getElementById('historyPanel').style.display === 'block'){
    showHistory();
  }
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
